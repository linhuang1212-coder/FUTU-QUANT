strategies:
  momentum:
    enabled: true
    params:
      fast_ma_period: 5
      slow_ma_period: 20
      rsi_period: 14
      rsi_oversold: 30
      rsi_overbought: 70
      volume_ratio_threshold: 1.5

  mean_reversion:
    enabled: true
    params:
      bb_period: 20
      bb_std: 2.0
      rsi_period: 14
      rsi_oversold: 25
      rsi_overbought: 75

  breakout:
    enabled: true
    params:
      lookback_period: 20
      volume_surge_ratio: 2.0
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      volume_weak_ratio: 1.3
      macd_required: false
      atr_breakout_enabled: true
      atr_breakout_multiplier: 1.5
      donchian_enabled: true

  rsi_reversal:
    enabled: true
    params:
      rsi_period: 7
      rsi_buy_threshold: 30
      rsi_sell_threshold: 70
      rsi_exit_middle: 50
      use_volume_filter: true
      min_volume_ratio: 1.0
      atr_period: 14
