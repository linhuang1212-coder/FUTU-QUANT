# 激进参数组 — 更频繁的交易信号，适合回测调参阶段
strategies:
  momentum:
    enabled: true
    params:
      fast_ma_period: 3
      slow_ma_period: 10
      rsi_period: 10
      rsi_oversold: 35
      rsi_overbought: 65
      volume_ratio_threshold: 1.2

  mean_reversion:
    enabled: true
    params:
      bb_period: 15
      bb_std: 1.8
      rsi_period: 10
      rsi_oversold: 30
      rsi_overbought: 70

  breakout:
    enabled: true
    params:
      lookback_period: 10
      volume_surge_ratio: 1.5
      macd_fast: 8
      macd_slow: 17
      macd_signal: 9
