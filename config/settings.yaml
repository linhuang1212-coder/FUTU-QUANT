futu:
  host: "127.0.0.1"
  port: 11111
  trade_env: REAL

account:
  initial_capital: 2700       # USD (≈ HKD 21,700)
  currency: USD

risk:
  max_loss_per_trade_pct: 0.05
  max_daily_loss_pct: 0.05    # $135/天
  max_position_pct: 0.35
  max_total_position_pct: 0.90
  max_consecutive_losses: 3
  cooldown_minutes: 60
  trailing_stop:
    activate_pct: 0.02
    trail_pct: 0.015
  hard_stop_pct: 0.05
  eod_close_minutes_before: 15

pdt:
  enabled: true
  max_day_trades: 3
  rolling_window_days: 5

signal:
  min_strength_stock: 60
  min_strength_option: 80

telegram:
  bot_token: ""   # set via .env: TELEGRAM_BOT_TOKEN
  chat_id: ""     # set via .env: TELEGRAM_CHAT_ID
  enabled: true

logging:
  level: INFO
  file: data_store/logs/futu_quant.log

scheduler:
  market_open: "09:30"
  market_close: "16:00"
  timezone: "US/Eastern"
  bar_interval_seconds: 60
